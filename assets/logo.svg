<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <!-- 100% Opacity White Background -->
  <rect width="320" height="80" fill="#ffffff" />
  
  <!-- Left Icon: AC Unit -->
  <g transform="translate(10, 10)">
    <!-- Black rounded square -->
    <rect width="60" height="60" rx="8" fill="#111111" />
    
    <!-- Concentric circular grill lines -->
    <circle cx="30" cy="30" r="23" fill="none" stroke="#333333" stroke-width="1" />
    <circle cx="30" cy="30" r="20" fill="none" stroke="#444444" stroke-width="1" />
    <circle cx="30" cy="30" r="17" fill="none" stroke="#555555" stroke-width="1" />
    
    <!-- Blue outer frame ring -->
    <circle cx="30" cy="30" r="24" fill="none" stroke="#2E3AE8" stroke-width="2.5" />
    
    <!-- Blue spiral/vortex design in center -->
    <g fill="#2E3AE8" stroke="#2E3AE8" stroke-width="1" stroke-linejoin="round">
      <path d="M30,30 C30,22 25,16 19,19 C13,22 13,30 19,34 C25,38 30,38 30,38 C30,38 27,33 25,32 C23,31 21,31 20,29 C19,27 20,24 22,23 C24,22 27,24 28,27 C29,30 30,30 30,30 Z" />
      <path d="M30,30 C38,30 44,25 41,19 C38,13 30,13 26,19 C22,25 22,30 22,30 C22,30 27,27 28,25 C29,23 29,21 31,20 C33,19 36,20 37,22 C38,24 36,27 33,28 C30,29 30,30 30,30 Z" />
      <path d="M30,30 C30,38 35,44 41,41 C47,38 47,30 41,26 C35,22 30,22 30,22 C30,22 33,27 35,28 C37,29 39,29 40,31 C41,33 40,36 38,37 C36,38 33,36 32,33 C31,30 30,30 30,30 Z" />
      <path d="M30,30 C22,30 16,35 19,41 C22,47 30,47 34,41 C38,35 38,30 38,30 C38,30 33,33 32,35 C31,37 31,39 29,40 C27,41 24,40 23,38 C22,36 24,33 27,32 C30,31 30,30 30,30 Z" />
    </g>
    
    <!-- White center hub -->
    <circle cx="30" cy="30" r="5" fill="#ffffff" stroke="#2E3AE8" stroke-width="1.5" />
  </g>
  
  <!-- Right Text -->
  <g transform="translate(85, 0)">
    <!-- Parkerson's -->
    <text x="0" y="38" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="700" font-size="28" fill="#2E3AE8" letter-spacing="-0.5">Parkerson's</text>
    
    <!-- Separator bar -->
    <line x1="0" y1="46" x2="225" y2="46" stroke="#2E3AE8" stroke-width="3" />
    
    <!-- HEATING - AIR -->
    <text x="2" y="65" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="600" font-size="15" fill="#111111" letter-spacing="4">HEATING - AIR</text>
  </g>
</svg>
